# EAS Submit Workflow
# Automatically submits production builds to App Store and Play Store

name: EAS Submit

on:
  workflow_run:
    workflows: ["EAS Build"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to submit'
        required: true
        default: 'all'
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  submit:
    name: Submit to Stores
    runs-on: ubuntu-latest
    # Only run if the build workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Submit iOS to App Store (internal TestFlight first)
      - name: Submit iOS to TestFlight
        if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all'))
        run: eas submit --platform ios --profile production --latest --non-interactive

      # Submit Android to Play Store (internal testing track)
      - name: Submit Android to Play Store
        if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all'))
        run: eas submit --platform android --profile production --latest --non-interactive
