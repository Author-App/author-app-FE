# EAS Build Workflow
# Triggers EAS builds for preview and production releases

name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'app.json'
      - 'eas.json'
      - 'ios/**'
      - 'android/**'
      - 'plugins/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      version_confirmed:
        description: '⚠️ Is app version updated in app.json? (Required for App Store releases)'
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📋 Check version (Manual builds)
        if: github.event_name == 'workflow_dispatch' && inputs.profile == 'production'
        run: |
          VERSION=$(cat app.json | jq -r '.expo.version')
          echo "📦 Current app version: $VERSION"
          echo ""
          if [ "${{ inputs.version_confirmed }}" != "true" ]; then
            echo "❌ ERROR: Production build requires version confirmation!"
            echo "Please check the 'version_confirmed' checkbox after verifying app.json version."
            exit 1
          fi
          echo "✅ Version confirmed: $VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build on push to main (production)
      - name: Build for Production (iOS)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas build --platform ios --profile production --non-interactive

      - name: Build for Production (Android)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas build --platform android --profile production --non-interactive

      # Manual builds
      - name: Build (Manual - iOS)
        if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all')
        run: eas build --platform ios --profile production --non-interactive --clear-cache

      - name: Build (Manual - Android)
        if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all')
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive
